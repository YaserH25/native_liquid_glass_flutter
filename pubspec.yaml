name: native_liquid_glass_flutter
description: Native iOS Liquid Glass surfaces, controls, overlays, menus, and adaptive Flutter fallbacks for Flutter apps.
version: 0.0.3
homepage: https://github.com/YaserH25/native_liquid_glass_flutter
repository: https://github.com/YaserH25/native_liquid_glass_flutter
issue_tracker: https://github.com/YaserH25/native_liquid_glass_flutter/issues
documentation: https://github.com/YaserH25/native_liquid_glass_flutter#readme
topics:
  - ios
  - liquid-glass
  - native
  - ui

screenshots:
  - description: Native Liquid Glass surface.
    path: doc/screenshots/components/liquid-glass-surface.png
  - description: Native iOS app bar.
    path: doc/screenshots/components/liquid-glass-app-bar.png
  - description: Native iOS tab bar.
    path: doc/screenshots/components/liquid-glass-tab-bar.png
  - description: Native iOS slider.
    path: doc/screenshots/components/liquid-glass-slider.png
  - description: Native iOS UIMenu.
    path: doc/screenshots/components/liquid-glass-uimenu-open.png
  - description: Native pull-down button.
    path: doc/screenshots/components/liquid-glass-pull-down-button.png
  - description: Native bottom sheet.
    path: doc/screenshots/components/liquid-glass-bottom-sheet.png
  - description: Native alert.
    path: doc/screenshots/components/liquid-glass-alert.png
  - description: RTL and Arabic locale support.
    path: doc/screenshots/components/liquid-glass-rtl-language.png

environment:
  sdk: ^3.12.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: NativeLiquidGlassFlutterPlugin
